---
- name: get current user name
  set_fact:
    current_user: "{{ ansible_facts['user_id'] }}"

- name: Add current user to sudoers with NOPASSWD
  copy:
    content: "{{ current_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ current_user }}"
    mode: "0440"
    owner: root
    group: root
    validate: "visudo -cf %s"
  become: true