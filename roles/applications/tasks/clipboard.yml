---
- name: ensure clipboard manager is installed
  apt:
    name: copyq
    state: present
  become: true
  
- name: ensure autostart directory exists
  file:
    path: "/home/{{ ansible_facts['user_id'] }}/.config/autostart"
    state: directory
    mode: '0755'
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"

- name: copy copyq autostart file
  copy:
    src: copyq.desktop
    dest: "/home/{{ ansible_facts['user_id'] }}/.config/autostart/copyq.desktop"
    mode: '0644'
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
