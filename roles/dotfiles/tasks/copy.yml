---
- name: copy dotfile files
  copy:
    src: "{{ playbook_dir }}/dotfiles/{{ item.src }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/{{ item.dest }}"
    mode: preserve
  loop: "{{ dotfile_mappings }}"
  when: item.type == "file"

- name: copy dotfile directories recursively
  synchronize:
    src: "{{ playbook_dir }}/dotfiles/{{ item.src }}/"
    dest: "{{ ansible_facts['env']['HOME'] }}/{{ item.dest }}/"
    recursive: yes
    delete: no
  loop: "{{ dotfile_mappings }}"
  when: item.type == "directory"