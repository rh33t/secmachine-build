[env]
TERM = "xterm-256color"

[window]
decorations = "None"
padding = { x = 5, y = 5 }
dynamic_padding = false
opacity = 0.98
startup_mode = "Maximized"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 14

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"

[bell]
duration = 0

[colors.primary]
background = "#23252e"
foreground = "#ffffff"

[colors.normal]
black = "#1f2229"
red = "#d41919"
green = "#5ebdab"
yellow = "#fea44c"
blue = "#367bf0"
magenta = "#9755b3"
cyan = "#49aee6"
white = "#e6e6e6"

[colors.bright]
black = "#198388"
red = "#ec0101"
green = "#47d4b9"
yellow = "#ff8a18"
blue = "#277fff"
magenta = "#962ac3"
cyan = "#05a1f7"
white = "#ffffff"

[colors.selection]
background = "#ffffff"
text = "#23252e"
